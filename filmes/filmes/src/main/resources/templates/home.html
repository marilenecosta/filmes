<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineFlow | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --azul-escuro: #001f3f; 
            --laranja: #ff851b; 
            --cinza-fundo: #f4f7f6; 
        }

        body { 
            background-color: var(--cinza-fundo); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        /* Faixa Azul do Cabeçalho com Linha Laranja */
        .header-sistema { 
            background-color: var(--azul-escuro); 
            color: white; 
            padding: 30px 0; 
            text-align: center; 
            border-bottom: 6px solid var(--laranja);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-sistema h1 { font-weight: 800; letter-spacing: 2px; margin: 0; font-size: 2.5rem; }
        .header-sistema p { color: var(--laranja); font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        /* Área Central Centralizada */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px; /* Espaço entre os dois botões */
            padding: 50px;
        }

        /* Estilo dos Botões (Cards Laranja) */
        .card-home {
            width: 280px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            text-decoration: none;
            transition: 0.3s;
            background-color: var(--laranja);
            color: white;
        }

        .card-home:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
            color: white;
        }

        .card-icon { font-size: 70px; margin-bottom: 15px; }
        .card-text { font-weight: bold; text-transform: uppercase; font-size: 1.1rem; }

        /* Rodapé Azul com Linha Laranja */
        .footer-sistema {
            background-color: var(--azul-escuro);
            padding: 25px 0;
            text-align: center;
            margin-top: auto;
            border-top: 6px solid var(--laranja);
        }

        .footer-text {
            color: white;
            font-weight: 500;
            margin: 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="header-sistema">
        <h1>SISTEMA CINEFLOW</h1>
        <p>Gestão de Acervo Cinematográfico</p>
    </div>

    <div class="main-content">
        <a th:href="@{/gerenciar}" class="card-home">
            <div class="card-icon">🎬</div>
            <div class="card-text">Catálogo de Filmes</div>
        </a>

        <a th:href="@{/generos}" class="card-home">
            <div class="card-icon">📋</div>
            <div class="card-text">Gênero</div>
        </a>
    </div>

    <div class="footer-sistema">
        <p class="footer-text">
            Desenvolvido por Marilene Costa | Faculdade de Tecnologia Rubens Lara | 2026
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
