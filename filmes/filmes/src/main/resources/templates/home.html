<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineFlow | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-escuro: #001f3f;
            --laranja: #ff851b;
            --laranja-desativado: #ffcc99;
        }

        body { 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* FAIXA AZUL SUPERIOR (HEADER GRANDE E IMPONENTE) */
        .header-sistema { 
            background-color: var(--azul-escuro); 
            color: white; 
            padding: 30px 0; 
            text-align: center;
            border-bottom: 8px solid var(--laranja);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .header-sistema h1 { 
            font-weight: bold; 
            margin: 0; 
            font-size: 2.5rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .header-sistema p { 
            color: var(--laranja); 
            font-weight: bold; 
            margin: 10px 0 0 0; 
            font-size: 1rem; 
            text-transform: uppercase;
        }

        /* CONTEÚDO CENTRAL */
        .content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .menu-grid { 
            display: flex; 
            gap: 30px; 
            padding: 20px;
        }

        /* BOTÕES/CARDS */
        .card-menu {
            background-color: var(--laranja);
            color: white;
            padding: 45px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            min-width: 250px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-menu:hover { 
            background-color: #e67300; 
            transform: translateY(-10px); 
            color: white; 
        }
        
        .card-disabled {
            background-color: var(--laranja-desativado);
            cursor: not-allowed;
            opacity: 0.8;
        }
        .card-disabled:hover { transform: none; }

        /* ÍCONES */
        .card-menu img { 
            width: 55px; 
            height: 55px;
            margin-bottom: 20px; 
        }

        /* FAIXA AZUL INFERIOR (RODAPÉ) */
        footer {
            background-color: var(--azul-escuro);
            color: white;
            text-align: center;
            padding: 20px 0;
            border-top: 6px solid var(--laranja);
            font-size: 0.95rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="header-sistema">
        <h1>SISTEMA CINEFLOW</h1>
        <p>Gestão de Acervo Cinematográfico</p>
    </div>

    <div class="content">
        <div class="menu-grid">
            
            <a th:href="@{/gerenciar}" class="card-menu">
                <img src="https://cdn-icons-png.flaticon.com/512/4221/4221419.png" alt="Filmes">
                CATÁLOGO DE FILMES
            </a>

            <div class="card-menu card-disabled">
                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png" alt="Clientes" style="filter: grayscale(100%); opacity: 0.6;">
                CLIENTES
            </div>

            <div class="card-menu card-disabled">
    <img src="https://cdn-icons-png.flaticon.com/512/151/151917.png" alt="Gênero" style="filter: grayscale(100%); opacity: 0.6;">
    GÊNERO
</div>

        </div>
    </div>

    <footer>
        Desenvolvido por Marilene Costa | Faculdade de Tecnologia Rubens Lara | 2026
    </footer>

</body>
</html>
