<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineFlow | Editar Filme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning"><h2>✏️ Editar Filme</h2></div>
        <div class="card-body">
            <form action="/filme/atualizar" method="post" class="row g-3">
                <input type="hidden" name="id" th:value="${filme['id']}">

                <div class="col-md-4">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" th:value="${filme['titulo']}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ano</label>
                    <input type="number" name="ano" class="form-control" th:value="${filme['ano']}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Diretor</label>
                    <input type="text" name="diretor" class="form-control" th:value="${filme['diretor']}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Gênero</label>
                    <select name="generoId" class="form-select" required>
                        <option th:each="g : ${generos}" 
                                th:value="${g.id}" 
                                th:text="${g.nome}" 
                                th:selected="${g.id == filme['genero_id']}"></option>
                    </select>
                </div>
                <div class="col-12 text-end">
                    <a href="/" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
