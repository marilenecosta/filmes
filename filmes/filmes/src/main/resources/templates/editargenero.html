<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CineFlow | Editar Gênero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-escuro: #001f3f; --laranja: #ff851b; --cinza-fundo: #f4f7f6; }
        body { background-color: var(--cinza-fundo); font-family: 'Segoe UI', sans-serif; }
        .header-sistema { background-color: var(--azul-escuro); color: white; padding: 20px 0; border-bottom: 6px solid var(--laranja); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .btn-principal { background-color: var(--laranja); color: white; font-weight: bold; border: none; transition: 0.3s; }
        .btn-principal:hover { background-color: #e67300; transform: translateY(-2px); color: white; }
        .titulo-edit { color: var(--azul-escuro); font-weight: bold; text-transform: uppercase; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="header-sistema mb-5">
        <div class="container text-center">
            <h2 class="m-0">✏️ EDIÇÃO DE GÊNERO</h2>
        </div>
    </div>

    <div class="container">
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <h4 class="titulo-edit">Alterar Informações</h4>
            
            <form th:action="@{/genero/atualizar}" method="post">
                <input type="hidden" name="id" th:value="${genero.ID != null ? genero.ID : genero.id}">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Nome do Gênero</label>
                    <input type="text" name="nome" class="form-control form-control-lg" 
                           th:value="${genero.NOME != null ? genero.NOME : genero.nome}" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-principal btn-lg">SALVAR ALTERAÇÕES</button>
                    <a th:href="@{/generos}" class="btn btn-outline-secondary">Cancelar e Voltar</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
